<!doctype html>
<meta charset="utf-8">
<title>Browser end-to-end check</title>
<!--
  Drives the real page in an iframe with synthetic Green Button data and reports
  what came out. Covers the parts tools/test.mjs cannot reach: the DOM wiring,
  Chart.js rendering, and the file-reading path.

  Serve the repo root, then open tools/browser-check.html.
-->
<style>
  body { font: 14px ui-monospace, monospace; padding: 20px; }
  .ok { color: #0a0; } .fail { color: #c00; font-weight: bold; }
  iframe { width: 1100px; height: 700px; border: 1px solid #ccc; margin-top: 20px; }
</style>
<div id="out">running…</div>
<iframe id="app" src="../index.html"></iframe>

<script type="module">
const out = [];
let failed = 0;
const check = (name, cond, detail = "") => {
  if (!cond) failed++;
  out.push(`<div class="${cond ? "ok" : "fail"}">${cond ? "ok  " : "FAIL"} ${name}${cond ? "" : "  " + detail}</div>`);
};

/**
 * 45 days of 15-minute data spanning the Jun 1 season boundary.
 *
 * With `solar`, midday intervals also export, which is what a real solar meter
 * records: the import and export channels are separate, and the meter never
 * sees the energy the house consumed straight off its own roof.
 */
function syntheticCsv({ solar = false, exportScale = 1, start: startDate = null, days = 45, battery = false } = {}) {
  const rows = [
    "Name,Test", "Address,Somewhere",
    "Meter Number,Date,Start Time,Duration,Consumption,Generation,Net",
  ];
  const start = startDate ?? new Date(2026, 4, 10); // May 10 -> Jun 23, crosses into summer
  for (let d = 0; d < days; d++) {
    for (let s = 0; s < 96; s++) {
      const t = new Date(start.getFullYear(), start.getMonth(), start.getDate() + d, 0, s * 15);
      const hour = t.getHours();
      // Evening-weighted shape so on-peak actually matters.
      const kwh = hour >= 16 && hour < 21 ? 0.42 : hour < 6 ? 0.08 : 0.18;
      // Midday export, tapering either side of noon — enough to matter without
      // making the household a net generator over the period.
      // exportScale > 1 turns the same household into a net generator, which is
      // a different case entirely: the bill floors at zero rather than shrinking.
      // A battery account discharges to the grid during the 4-8pm peak, which
      // solar cannot do — this is the shape the "already have a battery" guard
      // keys off. Overnight it charges hard from the grid.
      const midday = solar && hour >= 9 && hour < 16 ? 0.35 * exportScale : 0;
      const evening = battery && hour >= 16 && hour < 20 ? 0.6 : 0;
      const exported = midday + evening;
      const imported = battery && hour < 6 ? 1.2 : solar && exported > 0 ? 0.02 : kwh;
      const mer = hour < 12 ? "AM" : "PM";
      const h12 = hour % 12 === 0 ? 12 : hour % 12;
      const time = `${h12}:${String(t.getMinutes()).padStart(2, "0")} ${mer}`;
      const date = `${t.getMonth() + 1}/${t.getDate()}/${t.getFullYear()}`;
      rows.push(`"1","${date}","${time}","15","${imported.toFixed(4)}",` +
        `"${exported.toFixed(4)}","${(imported - exported).toFixed(4)}"`);
    }
  }
  return rows.join("\r\n");
}

/** Push a CSV through the real file input and let the page settle. */
async function importCsv(win, doc, text, { open = true } = {}) {
  const file = new win.File([text], "test.csv", { type: "text/csv" });
  const dt = new win.DataTransfer();
  dt.items.add(file);
  const input = doc.getElementById("file");
  input.files = dt.files;
  // Empty the table first, so waiting for rows waits for THIS import.
  //
  // Without it the rows from the previous import are still standing, the wait
  // below returns immediately, and everything after runs against a page that has
  // not reloaded yet — in particular the clicks in openAllSteps landed before
  // readFile's resetSteps(), which then collapsed the steps back underneath
  // them. That failed two runs in three, and looked like a bug in the step
  // navigation rather than in this helper.
  doc.querySelector("#ranking tbody").innerHTML = "";
  input.dispatchEvent(new win.Event("change"));
  // FileReader is async, but the recompute it triggers is not: rows, charts and
  // panels are all written in one synchronous block. So seeing a row means that
  // whole block has finished, charts included — a poll cannot observe a state
  // part way through it.
  await waitFor(() => doc.querySelectorAll("#ranking tbody tr").length > 0);
  await settle(150);
  // Loading a file collapses the page back to step 1, so walk it open again.
  // Every assertion after an import is about what the steps contain, not about
  // the gating itself — that is tested on its own below.
  if (open) await openAllSteps(win, doc);
}

/**
 * Click through the next buttons until the whole page is showing.
 *
 * Deliberately not a shortcut that strips the `hidden` class: the point is to
 * exercise the same path a user takes, so a broken next button fails the suite
 * rather than being papered over.
 */
async function openAllSteps(win, doc) {
  for (const id of ["step-setup", "step-results", "step-load"]) {
    const btn = doc.querySelector(`[data-next="${id}"]`);
    if (btn && !btn.closest(".step-nav").classList.contains("hidden")) {
      btn.click();
      await settle(120);
    }
  }
}

/**
 * Call applyBillFields inside the page with a fixture, the way the PDF path
 * would after parsing. The function is a module export, so a module script is
 * injected into the iframe to import and run it; recompute is a no-op here since
 * the assertions read the Step-2 controls, not the ranking.
 */
async function applyBill(win, doc, fields) {
  win.__billDone = false;
  const s = doc.createElement("script");
  s.type = "module";
  s.textContent =
    `import { applyBillFields } from "./js/ui/setup.js";` +
    `applyBillFields(${JSON.stringify(fields)}, [], () => {});` +
    `window.__billDone = true;`;
  doc.body.appendChild(s);
  await waitFor(() => win.__billDone === true);
  await settle(80);
}

/**
 * Ranking rows sharing the cheapest total. For a net exporter that is a group,
 * not a row: generation credits cancel everything they are allowed to cancel and
 * several plans land on the same non-bypassable Base Services Charge.
 */
/** Dollars out of a table cell, so two money columns can be compared as numbers. */
const money = (cell) => Number(cell.textContent.replace(/[^0-9.-]/g, ""));

const tiedRows = (doc) => {
  const groups = new Map();
  for (const r of doc.querySelectorAll("#ranking tbody tr")) {
    const total = r.cells[5].textContent.trim();
    groups.set(total, [...(groups.get(total) ?? []), r]);
  }
  return [...groups.values()].sort((a, b) => b.length - a.length)[0] ?? [];
};

const cheapestTotal = (doc) =>
  parseFloat(doc.querySelector("#ranking tbody tr").cells[5].textContent.replace(/[$,]/g, ""));

/**
 * Total for one named plan. Comparing NEM modes by cheapest row would compare
 * different plans — NEM 3.0 only ever ranks EV-TOU-5 — so anything measuring
 * the effect of a tariff has to hold the plan fixed.
 */
const totalForPlan = (doc, re) => {
  const row = [...doc.querySelectorAll("#ranking tbody tr")].find((r) => re.test(r.cells[0].textContent));
  return row ? parseFloat(row.cells[5].textContent.replace(/[$,]/g, "")) : NaN;
};

const setSelect = (win, doc, id, value) => {
  const el = doc.getElementById(id);
  el.value = value;
  el.dispatchEvent(new win.Event("change"));
};

const frame = document.getElementById("app");
const errors = [];

frame.addEventListener("load", () => run().catch((e) => {
  document.getElementById("out").innerHTML =
    out.join("") + `<h3 class="fail">HARNESS ERROR: ${e.message}<br><small>${e.stack}</small></h3>`;
  document.title = "FAIL harness";
}));

async function run() {
  const win = frame.contentWindow;
  const doc = frame.contentDocument;
  win.addEventListener("error", (e) => errors.push(e.message));
  win.addEventListener("unhandledrejection", (e) => errors.push(String(e.reason)));

  // Wait for the page to say it is wired rather than guessing at a duration.
  // init() fetches the rate index, every rate file, the history manifest and the
  // profile library before attaching a single listener, so a fixed timer that is
  // generous on an idle machine is not generous on a loaded one — clicks landed
  // before the step navigation existed, and the suite failed roughly two runs in
  // three for reasons that had nothing to do with the code under test.
  await waitFor(() => doc.documentElement.dataset.ready === "true");
  check("page booted without an error notice", !doc.querySelector(".notice.warn"),
    doc.querySelector(".notice.warn")?.textContent ?? "");
  // The provider list is filtered to whoever actually serves the selected city,
  // so this is SDG&E plus one CCA's products — not every overlay on disk.
  check("provider select offers the city's CCA plus bundled",
    doc.getElementById("provider").options.length >= 4,
    `${doc.getElementById("provider").options.length} options`);
  check("city select populated", doc.getElementById("city").options.length > 10);
  // Before a file is loaded there is nothing downstream to jump to, so every
  // next button stays hidden rather than scrolling to an empty step.
  check("no next button before a file is loaded",
    [...doc.querySelectorAll(".step-nav")].every((n) => n.classList.contains("hidden")),
    `${doc.querySelectorAll(".step-nav:not(.hidden)").length} visible`);
  check("city defaults to San Diego", doc.getElementById("city").value, "San Diego");
  check("city note states the franchise fee",
    /franchise fee 6\.88%/i.test(doc.getElementById("city-note").textContent),
    doc.getElementById("city-note").textContent);

  check("solar dropdown offers both NEM tariffs",
    [...doc.getElementById("nem").options].map((o) => o.value).join(),
    "none,nem2,nem3");

  // --- colophon ------------------------------------------------------------
  // The source link is static markup and must always be there. The build stamp
  // comes from build-info.json, which the Pages workflow writes at deploy time —
  // so this suite sees it only if someone has generated one locally. Both
  // outcomes are valid; what must never happen is a broken half-rendered line.
  const colophon = doc.querySelector(".colophon");
  check("footer links to the source repository",
    colophon?.querySelector('a[href*="github.com/thinkaliker/EnergyCalculator"]') !== null,
    colophon?.textContent.trim() ?? "no colophon");
  const stamp = doc.getElementById("build-info");
  check("build stamp is either a commit link or nothing at all",
    stamp.textContent === "" ||
      /^ · built from [0-9a-f]{7,}/.test(stamp.textContent),
    JSON.stringify(stamp.textContent));

  // Feed the synthetic export through the real file input. This first one is
  // imported without walking the steps open, so the gating can be checked in the
  // state a real user lands in.
  await importCsv(win, doc, syntheticCsv(), { open: false });

  const stillHidden = (id) => doc.getElementById(id).classList.contains("hidden");
  check("loading a file does not open steps 2-4 by itself",
    stillHidden("step-setup") && stillHidden("step-results") && stillHidden("step-load"),
    [stillHidden("step-setup"), stillHidden("step-results"), stillHidden("step-load")].join());
  // The ranking is computed regardless — the steps gate what is shown, not what
  // is calculated, so opening one never has to wait on a recompute.
  check("the ranking is costed even while step 3 is closed",
    doc.querySelectorAll("#ranking tbody tr").length >= 8);
  check("step 1's next button appears once there is data",
    !doc.querySelector('[data-next="step-setup"]').closest(".step-nav").classList.contains("hidden"));
  check("later steps offer no next button while closed",
    doc.querySelector('[data-next="step-load"]').closest(".step-nav").classList.contains("hidden"));

  await openAllSteps(win, doc);

  const rows = [...doc.querySelectorAll("#ranking tbody tr")];
  check("ranking table populated", rows.length >= 8, `${rows.length} rows`);
  check("results section revealed", !doc.getElementById("step-results").classList.contains("hidden"));
  check("headline rendered", /\$\d/.test(doc.getElementById("headline").textContent));

  const totals = rows.map((r) => parseFloat(r.cells[5].textContent.replace(/[$,]/g, "")));
  check("all totals are finite positive numbers", totals.every((t) => t > 0 && isFinite(t)), totals.join());
  check("totals are sorted cheapest first",
    totals.every((t, i) => i === 0 || t >= totals[i - 1]), totals.join());
  check("cheapest row is starred", rows[0].classList.contains("best"));

  // A 45-day export is not a year, and it must say so.
  const cov = doc.getElementById("coverage-warning").textContent;
  check("partial-year coverage warning shown", /not a full year/i.test(cov), cov.trim().slice(0, 80));
  check("coverage names the seasons covered", /winter|summer/i.test(cov));

  // Charts must actually render, not just exist as empty canvases.
  const canvases = ["chart-plans", "chart-shape", "chart-monthly", "chart-providers"]
    .map((id) => doc.getElementById(id));
  check("all four charts have drawn pixels",
    canvases.every((c) => c.width > 0 && c.height > 0 && hasInk(c)),
    canvases.map((c) => `${c.id}:${c.width}x${c.height}`).join(" "));

  // Ink alone is not enough — axes draw ink on an empty chart. Assert each
  // chart actually holds plotted values.
  const counts = canvases.map((c) => {
    const chart = win.Chart.getChart(c);
    return chart ? chart.data.datasets.reduce((n, ds) => n + ds.data.filter((v) => v != null).length, 0) : 0;
  });
  check("every chart has plotted data points", counts.every((n) => n > 0),
    canvases.map((c, i) => `${c.id}=${counts[i]}`).join(" "));
  // --- separately metered EV charger ---------------------------------------
  // EV-TOU prices a second meter the usage file knows nothing about, so it is
  // hidden until the user says that meter exists — and hidden *with a reason*,
  // since a silently shorter table reads as the full set of options.
  const planNames = () => [...doc.querySelectorAll("#ranking tbody tr")]
    .map((r) => r.cells[0].textContent).join(" | ");
  check("EV-TOU is hidden by default", !/EV-TOU\b(?!-)/.test(planNames()), planNames());
  check("and the table says why it is missing",
    /separately metered/i.test(doc.getElementById("excluded-note").textContent),
    doc.getElementById("excluded-note").textContent.trim().slice(0, 120));
  const evMeter = doc.getElementById("separate-ev-meter");
  evMeter.checked = true;
  evMeter.dispatchEvent(new win.Event("change"));
  await waitFor(() => /EV-TOU\b(?!-)/.test(planNames()));
  check("ticking the box brings EV-TOU back", /EV-TOU\b(?!-)/.test(planNames()), planNames());
  evMeter.checked = false;
  evMeter.dispatchEvent(new win.Event("change"));
  await waitFor(() => !/EV-TOU\b(?!-)/.test(planNames()));
  check("unticking hides it again", !/EV-TOU\b(?!-)/.test(planNames()), planNames());
  // Hiding it by default is not the whole answer — anyone who ticks the box gets
  // a single-meter approximation checked against no bill, and the page has to
  // say so somewhere permanent rather than only at the moment of exclusion.
  check("the caveats admit EV-TOU is priced as one meter",
    /EV-TOU is priced as one meter/.test(doc.getElementById("caveats").textContent),
    doc.getElementById("caveats").textContent.slice(0, 80));

  const providerChart = win.Chart.getChart(doc.getElementById("chart-providers"));
  check("provider chart compares more than one provider",
    providerChart && providerChart.data.labels.length > 1,
    `${providerChart?.data.labels.length ?? 0} bars`);
  check("provider chart values are all positive",
    providerChart.data.datasets[0].data.every((v) => v > 0));

  // Switching provider must re-cost, not silently keep SDG&E numbers.
  const before = totals[0];
  const provider = doc.getElementById("provider");
  provider.value = [...provider.options].find((o) => o.value.includes("sdcp"))?.value;
  provider.dispatchEvent(new win.Event("change"));
  await settle(700);
  const after = parseFloat(doc.querySelector("#ranking tbody tr").cells[5].textContent.replace(/[$,]/g, ""));
  check("switching to a CCA changes the totals", Math.abs(after - before) > 0.01, `${before} -> ${after}`);
  check("PCIA vintage auto-set from the product",
    !doc.getElementById("vintage-wrap").classList.contains("hidden"));

  // Adding an evening EV load must cost more than the overnight one — but only
  // on a time-of-use plan. DR prices on total kWh alone, so on DR the two are
  // legitimately identical; select a TOU plan before asserting otherwise.
  const touRow = rows.find((r) => !/tiered/.test(r.cells[0].textContent));
  touRow.dispatchEvent(new win.MouseEvent("click", { bubbles: true }));
  await settle(700);
  check("selecting a TOU plan highlights it",
    [...doc.querySelectorAll("#ranking tbody tr")].some((r) => r.classList.contains("selected")));

  const profile = doc.getElementById("profile");
  if (profile) {
    profile.value = "ev-overnight";
    profile.dispatchEvent(new win.Event("change"));
    await settle(600);
    const night = doc.getElementById("load-result").textContent;
    profile.value = "ev-evening";
    profile.dispatchEvent(new win.Event("change"));
    await settle(600);
    const evening = doc.getElementById("load-result").textContent;
    check("added-load section reports a cost", /bill rises \$\d/.test(night), night.slice(0, 80));
    check("overnight and evening EV differ", night !== evening);
    const risesBy = (t) => parseFloat(t.match(/bill rises \$([\d,.]+)/)?.[1].replace(/,/g, "") ?? 0);
    const nightAmt = risesBy(night);
    const eveAmt = risesBy(evening);
    check("evening charging costs more than overnight", eveAmt > nightAmt, `${nightAmt} vs ${eveAmt}`);
  }

  // Trimming toggle must change the day count.
  const trim = doc.getElementById("trim");
  trim.checked = false;
  trim.dispatchEvent(new win.Event("change"));
  await settle(500);
  check("untrimmed still renders", doc.querySelectorAll("#ranking tbody tr").length >= 8);

  // --- solar ---------------------------------------------------------------
  // Re-import as a solar account. Everything below is about the page noticing,
  // and about the two tariffs producing genuinely different answers.
  trim.checked = true;
  trim.dispatchEvent(new win.Event("change"));
  setSelect(win, doc, "provider", [...doc.getElementById("provider").options][0].value);
  await settle(400);
  const noSolarTotal = cheapestTotal(doc);

  await importCsv(win, doc, syntheticCsv({ solar: true }));

  await waitFor(() => /exported energy/i.test(doc.getElementById("solar-detected").textContent));
  const detected = doc.getElementById("solar-detected").textContent;
  check("page notices the file contains exported energy", /exported energy/i.test(detected),
    detected.trim().slice(0, 90));
  check("but does not guess a NEM version", doc.getElementById("nem").value, "none");
  check("solar vintage stays hidden until NEM 3.0 is picked",
    doc.getElementById("nbt-vintage-wrap").classList.contains("hidden"));

  // Hold the plan fixed across modes: EV-TOU-5 is the only one all three offer.
  const ignoringSolar = totalForPlan(doc, /EV-TOU-5/);
  check("EV-TOU-5 is priced before any NEM mode is picked", ignoringSolar > 0, ignoringSolar);

  setSelect(win, doc, "nem", "nem2");
  await waitFor(() => [...doc.querySelectorAll("#ranking tbody tr")]
    .every((r) => !/tiered/.test(r.cells[0].textContent)));
  const nem2Total = totalForPlan(doc, /EV-TOU-5/);
  check("NEM 2.0 costs less than ignoring the solar entirely", nem2Total < ignoringSolar,
    `${ignoringSolar} -> ${nem2Total}`);
  check("NEM 2.0 drops the tiered plan",
    [...doc.querySelectorAll("#ranking tbody tr")].every((r) => !/tiered/.test(r.cells[0].textContent)));
  check("NEM 2.0 says which plans it dropped and why",
    /not shown/i.test(doc.getElementById("excluded-note").textContent),
    doc.getElementById("excluded-note").textContent.trim().slice(0, 90));

  setSelect(win, doc, "nem", "nem3");
  await waitFor(() => doc.querySelectorAll("#ranking tbody tr").length === 1);
  const rows3 = [...doc.querySelectorAll("#ranking tbody tr")];
  check("NEM 3.0 shows only EV-TOU-5", rows3.length, 1, `${rows3.length} rows`);
  check("NEM 3.0 names the plan it kept", /EV-TOU-5/i.test(rows3[0]?.cells[0].textContent ?? ""));
  check("NEM 3.0 reveals the vintage selector",
    !doc.getElementById("nbt-vintage-wrap").classList.contains("hidden"));
  check("vintage selector is populated", doc.getElementById("nbt-vintage").options.length > 1);
  check("NEM 3.0 credits the exports", /export credit/i.test(rows3[0]?.cells[0].textContent ?? ""),
    rows3[0]?.cells[0].textContent ?? "");

  const nem3Total = totalForPlan(doc, /EV-TOU-5/);
  check("NEM 3.0 also beats ignoring the solar", nem3Total < ignoringSolar,
    `${ignoringSolar} -> ${nem3Total}`);
  // Retail netting is worth more than avoided-cost export at these prices, on
  // the same plan. If this ever flips, either the export table or the netting
  // path is wrong.
  check("NEM 2.0 beats NEM 3.0 on the same plan", nem2Total < nem3Total,
    `nem2 ${nem2Total} vs nem3 ${nem3Total}`);

  // Changing vintage must re-cost without error. It does NOT have to change the
  // total: all three vintages publish identical values for calendar year 2026,
  // verified against the source CSVs. They diverge in other years — NBT25 reads
  // 0.484405 for Sep 2025 against 0.580566 for Sep 2026 — so a period outside
  // 2026 would separate them. Asserting a difference here would be asserting
  // something the published data does not say.
  const vintages = [...doc.getElementById("nbt-vintage").options].map((o) => o.value);
  setSelect(win, doc, "nbt-vintage", vintages[vintages.length - 1]);
  await settle(700);
  check("switching NBT vintage re-costs without error",
    totalForPlan(doc, /EV-TOU-5/) > 0 && errors.length === 0,
    `${nem3Total} -> ${totalForPlan(doc, /EV-TOU-5/)}`);

  // The dangerous case: solar plan selected, no export data in the file.
  await importCsv(win, doc, syntheticCsv());
  await waitFor(() => /no exported energy/i.test(doc.getElementById("solar-detected").textContent));
  const warned = doc.getElementById("solar-detected").textContent;
  check("warns when a solar plan is picked on a non-solar file", /no exported energy/i.test(warned),
    warned.trim().slice(0, 90));

  setSelect(win, doc, "nem", "none");
  await settle(700);
  check("returning to no-solar restores the original total",
    Math.abs(cheapestTotal(doc) - noSolarTotal) < 0.01, `${noSolarTotal} vs ${cheapestTotal(doc)}`);

  // --- city ----------------------------------------------------------------
  // City sets the franchise fee and narrows the providers. Getting the SDCP rate
  // group wrong would take the PCIA vintage with it, so it is derived, not asked.
  setSelect(win, doc, "city", "Carlsbad");
  await waitFor(() => /cea/i.test(doc.getElementById("city-note").textContent));
  check("a CEA city offers CEA products",
    [...doc.getElementById("provider").options].some((o) => o.value.includes("cea")),
    [...doc.getElementById("provider").options].map((o) => o.value).join(" "));
  check("a CEA city does not offer SDCP",
    [...doc.getElementById("provider").options].every((o) => !o.value.includes("sdcp")));
  check("non-San-Diego city gets the 1.1% base franchise fee",
    /franchise fee 1\.10%/i.test(doc.getElementById("city-note").textContent),
    doc.getElementById("city-note").textContent);

  setSelect(win, doc, "city", "National City");
  await waitFor(() => /2022v/i.test(doc.getElementById("city-note").textContent));
  check("National City resolves to SDCP's 2022v rate group",
    [...doc.getElementById("provider").options].filter((o) => o.value.includes("sdcp"))
      .every((o) => o.value.includes("2022v")),
    [...doc.getElementById("provider").options].map((o) => o.value).join(" "));

  setSelect(win, doc, "city", "Coronado");
  await waitFor(() => /no community choice/i.test(doc.getElementById("city-note").textContent));
  check("a city with no CCA offers only bundled SDG&E",
    doc.getElementById("provider").options.length, 1);
  check("that still costs every plan",
    doc.querySelectorAll("#ranking tbody tr").length >= 8);

  // The franchise fee must actually move the total, not just the caption.
  setSelect(win, doc, "city", "San Diego");
  await waitFor(() => /6\.88/.test(doc.getElementById("city-note").textContent));
  setSelect(win, doc, "provider",
    [...doc.getElementById("provider").options].find((o) => o.value.includes("sdcp"))?.value);
  await settle(700);
  const sdTotal = cheapestTotal(doc);
  setSelect(win, doc, "city", "Chula Vista");
  await waitFor(() => /1\.10/.test(doc.getElementById("city-note").textContent));
  setSelect(win, doc, "provider",
    [...doc.getElementById("provider").options].find((o) => o.value.includes("sdcp"))?.value);
  await settle(700);
  check("leaving San Diego lowers the franchise fee and the total",
    cheapestTotal(doc) < sdTotal, `${sdTotal} -> ${cheapestTotal(doc)}`);

  // --- provider comparison -------------------------------------------------
  // Chula Vista is SDCP 2021v, which publishes three products, so the table has
  // something to compare. Currently on it from the franchise fee check above.
  const provRows = () => [...doc.querySelectorAll("#provider-table tbody tr")];
  await waitFor(() => provRows().length > 1);
  check("provider table lists bundled SDG&E plus every SDCP product",
    provRows().length === 4, `${provRows().length} rows`);
  check("provider table is sorted cheapest first", (() => {
    const totals = provRows().map((r) => Number(r.cells[5].textContent.replace(/[^0-9.]/g, "")));
    return totals.every((t, i) => i === 0 || t >= totals[i - 1]);
  })(), provRows().map((r) => r.cells[5].textContent).join(" "));
  check("provider table shows renewable content, which is what differs",
    new Set(provRows().map((r) => r.cells[1].textContent)).size > 1,
    provRows().map((r) => r.cells[1].textContent).join(" "));
  check("provider table only lists providers the city picker offers", (() => {
    const offered = [...doc.getElementById("provider").options].length;
    return provRows().length === offered;
  })(), `${provRows().length} rows`);
  check("provider table marks the cheapest row, and only it",
    provRows().filter((r) => r.classList.contains("best")).length === 1,
    provRows().map((r) => r.className || "-").join(" | "));
  check("the cheapest provider row is the first one",
    provRows()[0].classList.contains("best"), provRows()[0].className);
  check("provider table marks the provider selected in step 2",
    provRows().filter((r) => r.classList.contains("selected")).length === 1,
    provRows().map((r) => r.className || "-").join(" | "));

  // --- row highlighting in the plan ranking --------------------------------
  const rankRows = () => [...doc.querySelectorAll("#ranking tbody tr")];
  check("ranking marks exactly one cheapest row",
    rankRows().filter((r) => r.classList.contains("best")).length === 1,
    rankRows().map((r) => r.className || "-").join(" | "));
  check("ranking marks exactly one selected row",
    rankRows().filter((r) => r.classList.contains("selected")).length === 1,
    rankRows().map((r) => r.className || "-").join(" | "));
  // Clicking a dearer row must move the blue highlight without moving the star:
  // "cheapest" and "what you're looking at" are separate facts.
  const dearer = rankRows().at(-1);
  const dearerPlan = dearer.dataset.plan;
  const starredPlan = rankRows().find((r) => r.classList.contains("best")).dataset.plan;
  dearer.dispatchEvent(new win.MouseEvent("click", { bubbles: true }));
  await settle(500);
  check("clicking a row moves the selection highlight to it",
    rankRows().find((r) => r.classList.contains("selected"))?.dataset.plan === dearerPlan,
    dearerPlan);
  check("the star stays on the cheapest plan, not on the row you clicked",
    rankRows().find((r) => r.classList.contains("best"))?.dataset.plan === starredPlan,
    starredPlan);
  // Put the selection back on the cheapest plan so the scenario checks below
  // start from the same state they were written against.
  rankRows().find((r) => r.dataset.plan === starredPlan)
    .dispatchEvent(new win.MouseEvent("click", { bubbles: true }));
  await settle(500);

  // --- step navigation -----------------------------------------------------
  // openAllSteps has already walked the page open, so this is the state after a
  // full pass: everything visible, every next button offered.
  const nav = (id) => doc.querySelector(`[data-next="${id}"]`).closest(".step-nav");
  const hidden = (id) => doc.getElementById(id).classList.contains("hidden");
  check("walking the next buttons opens every step",
    !hidden("step-setup") && !hidden("step-results") && !hidden("step-load"),
    [hidden("step-setup"), hidden("step-results"), hidden("step-load")].join());
  check("next buttons are offered once their step is open",
    !nav("step-setup").classList.contains("hidden") &&
    !nav("step-results").classList.contains("hidden"), "");
  doc.querySelector('[data-next="step-results"]').click();
  await settle(200);
  check("clicking next focuses the step it names",
    doc.activeElement?.id === "step-results", doc.activeElement?.id ?? "none");

  // Re-clicking an earlier next button must not walk the sequence backwards —
  // the controls in an open step stay live, and collapsing the one just edited
  // would hide the effect of the edit.
  doc.querySelector('[data-next="step-setup"]').click();
  await settle(150);
  check("revealing an earlier step leaves the later ones open",
    !hidden("step-results") && !hidden("step-load"), "");

  // The way back to the file picker scrolls without touching visibility.
  const back = doc.querySelector('[data-scroll="step-import"]');
  check("step 4 offers a way back to the file picker",
    !!back && !back.closest(".step-nav").classList.contains("hidden"), "");
  back.click();
  await settle(200);
  check("starting over focuses step 1 and hides nothing",
    doc.activeElement?.id === "step-import" && !hidden("step-results"),
    doc.activeElement?.id ?? "none");

  // A city with no CCA has nothing to compare against, so the block hides
  // rather than showing a one-row table with a "vs cheapest" of zero.
  setSelect(win, doc, "city", "Coronado");
  await waitFor(() => doc.getElementById("provider-table-wrap").classList.contains("hidden"));
  check("provider table hides when only SDG&E serves the city", true);

  // --- solar and battery scenarios -----------------------------------------
  setSelect(win, doc, "profile", "");
  await settle(400);
  const result = () => doc.getElementById("load-result").textContent;
  const dropsBy = (t) => parseFloat(t.match(/bill drops \$([\d,.]+)/)?.[1].replace(/,/g, "") ?? 0);

  const solarKw = doc.getElementById("solar-kw");
  solarKw.value = "6";
  solarKw.dispatchEvent(new win.Event("input"));
  await waitFor(() => /bill drops/.test(result()));
  const solarSaving = dropsBy(result());
  check("adding solar lowers the bill", solarSaving > 0, result().slice(0, 90));
  check("system size seeds an annual output", Number(doc.getElementById("solar-kwh").value) > 0,
    doc.getElementById("solar-kwh").value);
  check("adding solar names the tariff change", /EV-TOU-5/.test(result()), result().slice(0, 140));

  setSelect(win, doc, "battery", "small");
  await waitFor(() => dropsBy(result()) !== solarSaving);
  const batterySaving = dropsBy(result());
  check("a battery on top of solar saves more", batterySaving > solarSaving,
    `${solarSaving} -> ${batterySaving}`);
  check("battery admits it is not an optimiser", /forecast/.test(result()), result().slice(0, 160));
  // Both strategies are costed and shown together — no toggle. The headline is
  // whichever saves more.
  check("both battery strategies are shown side by side",
    /Storing your own solar/.test(result()) && /Buying cheap/.test(result()),
    result().slice(0, 200));
  check("the two strategies render as compare rows",
    doc.querySelectorAll("#load-result .strategy-row").length === 2,
    `${doc.querySelectorAll("#load-result .strategy-row").length} rows`);
  check("exactly one strategy is marked the winner",
    doc.querySelectorAll("#load-result .strategy-row.win").length === 1, "");

  // Payback must not appear until a cost is supplied — a payback figure derived
  // from a number nobody entered is the worst thing this section could print.
  check("no payback before a cost is entered", !/pays back/.test(result()));
  const costInput = doc.getElementById("scenario-cost");
  costInput.value = "20000";
  costInput.dispatchEvent(new win.Event("input"));
  await waitFor(() => /pays back/.test(result()));
  check("payback appears once a cost is entered", /pays back in [\d.]+ years/.test(result()),
    result().slice(-120));

  costInput.value = "";
  costInput.dispatchEvent(new win.Event("input"));
  setSelect(win, doc, "battery", "");
  solarKw.value = "0";
  solarKw.dispatchEvent(new win.Event("input"));
  await waitFor(() => result() === "");
  check("clearing the scenario clears the result", result() === "", result().slice(0, 60));

  // A battery with no solar at all: "storing your own solar" has nothing to
  // store, so it should save nothing, while "buying cheap" still arbitrages.
  // Both rows appear regardless — the comparison is the point.
  setSelect(win, doc, "battery", "large");
  await waitFor(() => /bill (drops|rises)/.test(result()));
  check("a battery alone still changes the bill", /bill (drops|rises)/.test(result()),
    result().slice(0, 90));
  check("with no solar, the solar-storage strategy saves nothing",
    /Storing your own solar<\/b> — saves nothing/.test(doc.getElementById("load-result").innerHTML),
    doc.getElementById("load-result").innerHTML.match(/Storing your own solar[^<]*<\/b>[^<]*/)?.[0] ?? "?");

  setSelect(win, doc, "battery", "");
  await settle(300);

  // --- a file that already reflects a battery --------------------------------
  // Its export lands in the 4-8pm peak, so the guard should tick itself, switch
  // "add a battery" off, and refuse to model a second one on top of the first.
  await importCsv(win, doc, syntheticCsv({ solar: true, battery: true }));
  await settle(300);
  check("a battery account ticks the 'already have a battery' box",
    doc.getElementById("has-battery").checked, "");
  check("and disables the add-battery control",
    doc.getElementById("battery").disabled, "");
  // Trying to add one anyway must not take: the control is off and the scenario
  // stays empty rather than costing a battery over a battery.
  setSelect(win, doc, "battery", "large");
  await settle(300);
  check("selecting a battery does nothing while one is already present",
    doc.getElementById("battery").value === "" && !/battery/i.test(doc.getElementById("load-result").textContent),
    `${doc.getElementById("battery").value} | ${doc.getElementById("load-result").textContent.slice(0, 60)}`);
  check("the note explains why add-battery is off",
    /already have a battery/i.test(doc.getElementById("scenario-note").textContent),
    doc.getElementById("scenario-note").textContent.slice(0, 80));

  // Unticking it by hand hands control back — the account can then be modelled
  // as if it had none, for a user who knows the export is not from a battery.
  const hb = doc.getElementById("has-battery");
  hb.checked = false;
  hb.dispatchEvent(new win.Event("change"));
  await settle(200);
  check("unticking the box re-enables add-battery",
    !doc.getElementById("battery").disabled, "");

  // --- net exporter: plans tie on the non-bypassable floor -------------------
  // A household that exports more than it imports cancels every charge credits
  // are allowed to cancel, and lands on the Base Services Charge — the same
  // figure on every plan that carries it. The totals column then stops
  // distinguishing them, so the ranking falls back to the credit left over, and
  // that has to stay labelled as credit rather than as savings: the utility
  // keeps it at the true-up date, so it is never money in anyone's pocket.
  //
  // Scale 8 is what it takes for midday export credit to outweigh evening peak
  // import on this shape — NEM 2.0 nets inside a TOU period, so cheap midday
  // kWh do not cancel expensive evening kWh one for one.
  await importCsv(win, doc, syntheticCsv({ solar: true, exportScale: 8 }));
  setSelect(win, doc, "nem", "nem2");
  await waitFor(() => tiedRows(doc).length > 1);
  const tied = tiedRows(doc);
  check("a net exporter ties several plans on the same floor", tied.length > 1,
    `${tied.length} rows at ${tied[0].cells[5].textContent.trim()}`);
  // The floor is neither $0 nor the fixed charge: credits also cannot reach the
  // non-bypassable charges on whatever was imported. A net-exporter reference
  // bill prints exactly that sum as its Total Electric Charges — see
  // tools/verify.mjs — so the total must sit strictly above the fixed column.
  check("that floor is the Base Services Charge, not $0",
    !/^\$0\.00$/.test(tied[0].cells[5].textContent.trim()), tied[0].cells[5].textContent.trim());
  check("and it clears the fixed charge, because NBCs are not offsettable either",
    money(tied[0].cells[5]) > money(tied[0].cells[3]),
    `total ${tied[0].cells[5].textContent.trim()} vs fixed ${tied[0].cells[3].textContent.trim()}`);
  check("tied rows still report their leftover credit",
    tied.every((r) => /credit forfeited at true-up/.test(r.cells[0].textContent)),
    tied.map((r) => r.cells[0].textContent.trim().split("\n").pop()).join(" | "));
  check("only one row is starred even when the totals tie",
    [...doc.querySelectorAll("#ranking tbody tr.best")].length === 1,
    `${doc.querySelectorAll("#ranking tbody tr.best").length} starred`);
  // Within a tie the credit is the whole ranking, so it must be ordered by it.
  check("tied rows are ordered by leftover credit, most first", (() => {
    const credit = (r) => Number(r.cells[0].textContent.match(/\$([\d,.]+) credit forfeited at true-up/)?.[1]
      .replace(/,/g, "") ?? 0);
    return tied.every((r, i) => i === 0 || credit(r) <= credit(tied[i - 1]));
  })(), tied.map((r) => r.cells[0].textContent.match(/\$[\d,.]+ credit/)?.[0]).join(" | "));
  // The credit-gap fallback needs rows tied with the *overall* cheapest, which
  // the plan ranking does not give here: EV-TOU has no Base Services Charge, so
  // it undercuts the tie group on its own. Every row of the provider table is
  // the same plan, so those do all land on the same floor.
  // TOU-DR1 specifically: the ranking's own cheapest row here is EV-TOU, which
  // carries a minimum bill instead of the Base Services Charge and so does not
  // floor with the others.
  setSelect(win, doc, "city", "Chula Vista");
  await waitFor(() => !doc.getElementById("provider-table-wrap").classList.contains("hidden"));
  [...doc.querySelectorAll("#ranking tbody tr")].find((r) => r.dataset.plan === "tou-dr1")
    .dispatchEvent(new win.MouseEvent("click", { bubbles: true }));
  await waitFor(() => /TOU-DR1/.test(doc.getElementById("provider-table-plan").textContent));
  const provTied = [...doc.querySelectorAll("#provider-table tbody tr")];
  // Not every provider reaches the floor — bundled SDG&E credits exports less
  // generously, so it can still owe more than the Base Services Charge.
  check("providers whose credits cover the bill land on the same floor",
    provTied.filter((r) => r.cells[5].textContent.trim() === provTied[0].cells[5].textContent.trim())
      .length > 1,
    provTied.map((r) => r.cells[5].textContent.trim()).join(" "));
  check("vs-cheapest falls back to the credit gap rather than a row of dashes",
    /less credit/.test(provTied[1].cells[6].textContent), provTied[1].cells[6].textContent.trim());

  // --- rate revisions --------------------------------------------------------
  // The default fixture runs May 10 - Jun 23 2026, which crosses the Jun 1 rate
  // change, so two revisions priced it and the page has to say so.
  const revPanel = doc.getElementById("rate-revisions");
  check("the rate-revision panel shows when a file spans a rate change",
    !revPanel.classList.contains("hidden"), revPanel.className);
  check("listing every revision that priced the period",
    doc.querySelectorAll("#rate-revisions .revision-list li").length >= 2,
    `${doc.querySelectorAll("#rate-revisions .revision-list li").length} listed`);
  // The archived revisions are extracted, not yet read by a person, and the page
  // must not present them as though they were.
  check("and flagging the ones nobody has verified",
    /not human-verified/.test(revPanel.textContent), revPanel.textContent.slice(0, 80));
  check("while still saying the numbers are used in full",
    /used in full/.test(revPanel.textContent), "");

  // The negative case runs at the very end of the suite — it needs a different
  // fixture, and re-importing mid-run changes the state every later assertion
  // reads.

  // --- annual true-up --------------------------------------------------------
  // Only NEM 2.0 has a Relevant Period, so the section and its date field appear
  // for nem2 and for nothing else.
  const trueup = doc.getElementById("trueup");
  check("the true-up section shows for a NEM 2.0 household",
    !trueup.classList.contains("hidden"), trueup.className);
  check("and its date field shows with it",
    !doc.getElementById("trueup-wrap").classList.contains("hidden"), "");
  check("the ledger has a row per billing month",
    doc.querySelectorAll("#trueup-ledger tbody tr").length > 0,
    `${doc.querySelectorAll("#trueup-ledger tbody tr").length} rows`);
  // This fixture exports far more than it imports, so the kWh test passes and
  // the wording must say so.
  check("a net kWh exporter is told the surplus qualifies",
    /qualifies for Net Surplus Compensation|has to end that way/.test(
      doc.getElementById("trueup-outcome").textContent),
    doc.getElementById("trueup-outcome").textContent.slice(0, 120));
  // The payout is never given a dollar figure, because the rate is not modelled.
  check("no dollar figure is invented for the payout",
    /does not fetch it/.test(doc.getElementById("trueup-note").textContent),
    doc.getElementById("trueup-note").textContent.slice(0, 80));
  // An inferred date is a guess and is marked as one.
  check("an inferred true-up date is flagged as guessed",
    doc.getElementById("trueup-date-note").classList.contains("inferred"),
    doc.getElementById("trueup-date-note").textContent.slice(0, 60));

  // Entering the real date moves the period, so the ledger must change with it.
  const beforeRows = doc.querySelectorAll("#trueup-ledger tbody tr").length;
  const dateField = doc.getElementById("trueup-date");
  dateField.value = "2027-03-15";
  dateField.dispatchEvent(new win.Event("change", { bubbles: true }));
  await settle(300);
  check("entering a true-up date stops it being flagged as guessed",
    !doc.getElementById("trueup-date-note").classList.contains("inferred"),
    doc.getElementById("trueup-date-note").textContent.slice(0, 60));
  check("and re-anchors the ledger to that anniversary",
    doc.querySelectorAll("#trueup-ledger tbody tr").length !== beforeRows ||
      doc.getElementById("trueup-outcome").textContent.includes("Mar"),
    doc.getElementById("trueup-outcome").textContent.slice(0, 100));

  // A household with no solar has no Relevant Period at all.
  setSelect(win, doc, "nem", "none");
  await settle(300);
  check("the true-up section disappears without solar",
    doc.getElementById("trueup").classList.contains("hidden"), "");

  // --- rate revisions, negative case -----------------------------------------
  // The other half of the claim made earlier: a period the current rates cover
  // on their own fetches no archive and shows no panel. Last in the run because
  // it swaps the fixture, and every assertion above reads the old one.
  await importCsv(win, doc, syntheticCsv({ start: new Date(2026, 5, 5), days: 20 }));
  check("the rate-revision panel stays hidden for a period inside one revision",
    doc.getElementById("rate-revisions").classList.contains("hidden"),
    doc.getElementById("rate-revisions").className);

  // --- bill import: applying parsed fields to Step 2 -----------------------
  // parseBill (pdf.js) can't be fed a committed PDF, so this drives the apply
  // half directly: inject a module script that calls applyBillFields with a
  // fixture the way the PDF path would, then assert the controls took the values
  // and the summary rendered. Runs last — it mutates the Step-2 selects.
  await applyBill(win, doc, {
    climateZone: "inland", nemMode: "nem2", trueUpDate: "2026-02-19",
    ccaProvider: "sdcp", pciaVintage: 2021, city: "San Diego",
  });
  check("bill import sets the climate zone", doc.getElementById("zone").value, "inland");
  check("bill import sets the NEM mode", doc.getElementById("nem").value, "nem2");
  check("bill import sets the true-up date", doc.getElementById("trueup-date").value, "2026-02-19");
  check("bill import defaults the SDCP tier to PowerOn, not just the first match",
    /sdcp-2021v-poweron/.test(doc.getElementById("provider").value), doc.getElementById("provider").value);
  check("bill import sets the PCIA vintage", doc.getElementById("vintage").value, "2021");
  check("bill import shows a summary of what it filled",
    /from your bill/i.test(doc.getElementById("bill-detected").textContent),
    doc.getElementById("bill-detected").textContent.slice(0, 80));
  // The unset product tier is called out prominently, naming the assumed default.
  check("bill import highlights the assumed provider tier",
    !!doc.querySelector("#bill-detected .bill-highlight") &&
      /PowerOn/.test(doc.querySelector("#bill-detected .bill-highlight").textContent),
    doc.querySelector("#bill-detected .bill-highlight")?.textContent.slice(0, 90) ?? "no highlight");
  // A field the bill couldn't determine (unknown city) must be skipped, not forced.
  await applyBill(win, doc, { climateZone: "desert", city: "Atlantis" });
  check("bill import skips a city the rate data doesn't know",
    doc.getElementById("city").value !== "Atlantis", doc.getElementById("city").value);
  check("bill import still applies the fields it did recognize",
    doc.getElementById("zone").value, "desert");

  check("no uncaught errors during the run", errors.length === 0, errors.join(" | "));

  document.getElementById("out").innerHTML =
    out.join("") + `<h3 class="${failed ? "fail" : "ok"}">${failed ? failed + " FAILED" : "ALL PASSED"}</h3>`;
  document.title = failed ? `FAIL ${failed}` : "PASS";
}

/** Any non-transparent pixel means Chart.js actually drew something. */
function hasInk(canvas) {
  try {
    const ctx = canvas.getContext("2d");
    const { data } = ctx.getImageData(0, 0, canvas.width, canvas.height);
    for (let i = 3; i < data.length; i += 4) if (data[i] !== 0) return true;
    return false;
  } catch {
    return false;
  }
}

const settle = (ms) => new Promise((r) => setTimeout(r, ms));

/**
 * Wait until `fn()` is truthy, then return.
 *
 * Fixed sleeps made this harness flaky: FileReader is async, re-costing prices
 * every plan, and a sleep that is long enough on one run is not on the next.
 * The failure then surfaces as an unrelated assertion further down. Polling for
 * the condition each assertion actually depends on removes the race instead of
 * padding around it, and a genuine regression still fails — just after the
 * timeout rather than immediately.
 */
async function waitFor(fn, timeout = 6000, step = 100) {
  const deadline = Date.now() + timeout;
  while (Date.now() < deadline) {
    try { if (fn()) return true; } catch { /* mid-render; try again */ }
    await settle(step);
  }
  return false;
}
</script>
